# This is a docker-compose file for a MariaDB database and Adminer
# Using for development purposes only

version: '3.8'

services:
  db:
    image: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - 3306:3306
    volumes:
      - ./.temp/db:/var/lib/mysql

  adminer:
    image: adminer
    ports:
      - '8080:8080'
